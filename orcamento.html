<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orçamento — Oficina de Turismo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --azul:#1B3A6B;--azul2:#2E5FA3;--verde:#2D6A4F;--verde2:#40916C;
      --dourado:#C9A84C;--dourado2:#b8941f;--cinza:#F5F6FA;--branco:#fff;
      --sombra:0 4px 20px rgba(0,0,0,.10);--radius:12px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cinza);color:#444;line-height:1.6;}
    a{text-decoration:none;color:inherit;}
    img{max-width:100%;height:auto;}

    /* ══ HEADER ══ */
    .orc-header{
      background:linear-gradient(135deg,var(--azul) 0%,var(--verde) 100%);
      padding:15px 24px;
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:15px;
      box-shadow:0 3px 16px rgba(0,0,0,.28);
    }
    .orc-logo{
      display:flex;align-items:center;gap:14px;
      background:rgba(255,255,255,.12);padding:6px 16px;
      border-radius:10px;border:1px solid rgba(255,255,255,.2);
    }
    .orc-logo img.lp{
      height:68px;width:auto;object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
    }
    .orc-logo img.l30{
      height:58px;width:auto;object-fit:contain;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
    }
    .logo-sep{width:1px;height:54px;background:rgba(255,255,255,.30);}
    .orc-info .titulo{color:#fff;font-size:1.1rem;font-weight:700;}
    .orc-badge{
      background:var(--dourado);color:#fff;font-size:.75rem;
      font-weight:700;padding:3px 12px;border-radius:10px;
      letter-spacing:1px;width:fit-content;margin-top:5px;
    }
    .orc-header-right{display:flex;align-items:center;gap:14px;}
    .orc-header-right a{
      color:rgba(255,255,255,.75);font-size:.88rem;
      display:flex;align-items:center;gap:6px;transition:all .3s;
    }
    .orc-header-right a:hover{color:var(--dourado);}

    /* ══ HERO ══ */
    .hero-section{
      position:relative;height:450px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      text-align:center;color:#fff;
      box-shadow:0 5px 20px rgba(0,0,0,.2);
    }
    .hero-bg{
      position:absolute;top:0;left:0;width:100%;height:100%;
      object-fit:cover;filter:brightness(.6);
      transition:opacity .5s ease-in-out;
    }
    .hero-content{position:relative;z-index:1;padding:20px;}
    .hero-content h1{font-size:2.8rem;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.5);}
    .hero-content p{font-size:1.3rem;font-weight:300;text-shadow:0 1px 5px rgba(0,0,0,.5);}
    .hero-content .data{font-size:1.1rem;margin-top:10px;font-weight:600;}

    .hero-carousel-dots{
      position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
      display:flex;gap:8px;z-index:2;
    }
    .hero-carousel-dots .dot{
      width:10px;height:10px;background:rgba(255,255,255,.5);
      border-radius:50%;cursor:pointer;transition:all .3s;
    }
    .hero-carousel-dots .dot.active{background:#fff;transform:scale(1.2);}

    /* ══ MAIN CONTENT ══ */
    .main-content{
      max-width:900px;margin:30px auto;padding:0 20px;
    }
    .section-card{
      background:#fff;border-radius:var(--radius);box-shadow:var(--sombra);
      padding:25px;margin-bottom:25px;
      opacity:0;transform:translateY(20px);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .section-card.vis{opacity:1;transform:translateY(0);}
    .section-card h2{
      color:var(--azul);font-size:1.6rem;margin-bottom:20px;
      padding-bottom:10px;border-bottom:2px solid #f0f0f0;
      display:flex;align-items:center;gap:10px;
    }
    .section-card h2 i{color:var(--dourado);}

    /* ══ LISTAS (INCLUÍDOS / NÃO INCLUÍDOS) ══ */
    .lista-itens{list-style:none;padding:0;}
    .lista-itens li{
      padding:8px 0;border-bottom:1px dashed #eee;
      display:flex;align-items:flex-start;gap:10px;
      font-size:.95rem;
    }
    .lista-itens li:last-child{border-bottom:none;}
    .lista-itens li i{color:var(--verde);margin-top:3px;}
    .lista-itens li.nao-incluido i{color:#e74c3c;}

    /* ══ ROTEIRO ══ */
    .roteiro-timeline{
      position:relative;padding-left:30px;
      border-left:2px solid var(--azul);
    }
    .roteiro-timeline::before{
      content:'';position:absolute;top:0;left:-2px;width:6px;height:100%;
      background:linear-gradient(to bottom,var(--azul),var(--verde));
      z-index:0;
    }
    .dia{
      position:relative;margin-bottom:30px;
      background:#fff;border-radius:var(--radius);box-shadow:var(--sombra);
      padding:20px;
      opacity:0;transform:translateY(20px);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .dia.vis{opacity:1;transform:translateY(0);}
    .dia-num{
      position:absolute;left:-55px;top:0;
      background:var(--dourado);color:#fff;
      width:50px;height:50px;border-radius:50%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-size:1.4rem;font-weight:700;line-height:1;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
    }
    .dia-num small{font-size:.6rem;font-weight:400;}
    .dia-corpo{display:flex;gap:20px;flex-wrap:wrap;}
    .dia-foto-wrap{flex-shrink:0;width:250px;height:180px;border-radius:8px;overflow:hidden;border:1px solid #eee;}
    .dia-foto{width:100%;height:100%;object-fit:cover;}
    .dia-txt{flex:1;}
    .dia-txt h4{color:var(--azul);font-size:1.2rem;margin-bottom:10px;}
    .dia-txt p{font-size:.95rem;}

    /* ══ VALORES ══ */
    .valores-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;margin-bottom:20px;
    }
    .val-card{
      background:linear-gradient(135deg,var(--azul),var(--azul2));
      color:#fff;border-radius:var(--radius);padding:20px;
      box-shadow:var(--sombra);text-align:center;
      opacity:0;transform:translateY(20px);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .val-card.vis{opacity:1;transform:translateY(0);}
    .val-card .v-label{font-size:1.1rem;font-weight:600;margin-bottom:8px;}
    .val-card .v-preco{font-size:2.2rem;font-weight:700;margin-bottom:10px;color:var(--dourado);}
    .val-card .v-desc{font-size:.85rem;opacity:.8;}

    .parcelamento-info{
      background:#fff;border-radius:var(--radius);box-shadow:var(--sombra);
      padding:20px;text-align:center;font-size:1.1rem;font-weight:600;
      color:var(--verde);border:2px solid var(--verde);
      opacity:0;transform:translateY(20px);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .parcelamento-info.vis{opacity:1;transform:translateY(0);}

    /* ══ ADICIONAIS ══ */
    .adicionais-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }
    .adicionais-item{
      background:#f9f9f9;border-radius:var(--radius);padding:20px;
      border:1px solid #eee;box-shadow:var(--sombra);
      opacity:0;transform:translateY(20px);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .adicionais-item.vis{opacity:1;transform:translateY(0);}
    .adicionais-item h4{color:var(--azul);font-size:1.1rem;margin-bottom:10px;}
    .adicionais-item p{font-size:.9rem;margin-bottom:5px;}
    .adicionais-item p strong{color:var(--azul2);}

    /* ══ GALERIA ══ */
    .galeria-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
    }
    .galeria-item{
      border-radius:var(--radius);overflow:hidden;box-shadow:var(--sombra);
      height:150px;border:1px solid #eee;
      opacity:0;transform:scale(.9);transition:opacity .6s ease-out, transform .6s ease-out;
    }
    .galeria-item.vis{opacity:1;transform:scale(1);}
    .galeria-item img{width:100%;height:100%;object-fit:cover;}

    /* ══ CONDIÇÕES / OBSERVAÇÕES ══ */
    .texto-formatado p{margin-bottom:1em;}
    .texto-formatado p:last-child{margin-bottom:0;}

    /* ══ FAB AREA (PDF / WHATSAPP) ══ */
    .fab-area{
      position:fixed;bottom:25px;right:25px;z-index:999;
      display:flex;flex-direction:column;gap:15px;
    }
    .fab-btn{
      background:var(--azul);color:#fff;width:55px;height:55px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:1.5rem;box-shadow:var(--sombra);cursor:pointer;
      transition:all .3s;border:none;
    }
    .fab-btn:hover{background:var(--azul2);transform:scale(1.05);}
    .fab-btn.pdf{background:#e74c3c;}
    .fab-btn.pdf:hover{background:#c0392b;}
    .fab-btn.wpp{background:#25D366;}
    .fab-btn.wpp:hover{background:#1ebe5d;}

    /* ══ LOADING OVERLAY (PDF) ══ */
    .load-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.7);z-index:1000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;font-size:1.2rem;
      opacity:0;visibility:hidden;transition:opacity .3s;
    }
    .load-overlay.on{opacity:1;visibility:visible;}
    .load-overlay .spinner{
      border:4px solid rgba(255,255,255,.3);border-top:4px solid #fff;
      border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;
      margin-bottom:20px;
    }
    .load-overlay .progress-bar{
      width:80%;height:8px;background:rgba(255,255,255,.2);border-radius:4px;
      overflow:hidden;margin-top:15px;
    }
    .load-overlay .progress-bar-fill{
      height:100%;width:0%;background:var(--dourado);border-radius:4px;
      transition:width .2s ease-out;
    }
    @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

    /* Responsividade */
    @media(max-width:768px){
      .orc-header{flex-direction:column;text-align:center;}
      .orc-header-right{width:100%;justify-content:center;}
      .hero-content h1{font-size:2rem;}
      .hero-content p{font-size:1rem;}
      .main-content{margin:20px auto;padding:0 15px;}
      .section-card{padding:20px;}
      .section-card h2{font-size:1.4rem;}
      .roteiro-timeline{padding-left:20px;}
      .dia-num{left:-45px;width:40px;height:40px;font-size:1.2rem;}
      .dia-num small{font-size:.5rem;}
      .dia-corpo{flex-direction:column;}
      .dia-foto-wrap{width:100%;height:200px;}
      .valores-grid,.adicionais-grid,.galeria-grid{grid-template-columns:1fr;}
      .fab-area{bottom:15px;right:15px;}
      .fab-btn{width:50px;height:50px;font-size:1.3rem;}
    }
  </style>
</head>
<body>

  <header class="orc-header">
    <div class="orc-logo">
      <img src="assets/images/logo.png" alt="Oficina de Turismo" class="lp"/>
      <div class="logo-sep"></div>
      <img src="assets/images/logo-30-anos.png" alt="30 Anos" class="l30"/>
    </div>
    <div class="orc-info">
      <span class="titulo" id="orc-titulo-header">Carregando Orçamento...</span>
      <span class="orc-badge" id="orc-status-header"></span>
    </div>
    <div class="orc-header-right">
      <a href="index.html">
        <i class="fas fa-arrow-left"></i> Voltar ao Painel
      </a>
    </div>
  </header>

  <section class="hero-section">
    <img id="hero-bg" class="hero-bg" src="https://via.placeholder.com/1920x450/1B3A6B/FFFFFF?text=Oficina+de+Turismo" alt="Hero Background"/>
    <div class="hero-content">
      <h1 id="orc-titulo"></h1>
      <p id="orc-subtitulo"></p>
      <p class="data" id="orc-data-viagem"></p>
    </div>
    <div id="hero-carousel-dots" class="hero-carousel-dots"></div>
  </section>

  <div id="main-content" class="main-content">

    <section id="section-incluidos" class="section-card fade-in">
      <h2><i class="fas fa-list-check"></i> O que está incluído</h2>
      <ul id="incluidos-lista" class="lista-itens">
        <!-- Itens incluídos serão renderizados aqui -->
      </ul>
    </section>

    <section id="section-nao-incluidos" class="section-card fade-in">
      <h2><i class="fas fa-times-circle"></i> O que não está incluído</h2>
      <ul id="nao-incluidos-lista" class="lista-itens">
        <!-- Itens não incluídos serão renderizados aqui -->
      </ul>
    </section>

    <section id="section-roteiro" class="section-card fade-in">
      <h2><i class="fas fa-route"></i> Roteiro Dia a Dia</h2>
      <div id="roteiro-timeline" class="roteiro-timeline">
        <!-- Roteiro será renderizado aqui -->
      </div>
    </section>

    <section id="section-valores" class="section-card fade-in">
      <h2><i class="fas fa-dollar-sign"></i> Valores por Pessoa</h2>
      <div id="valores-grid" class="valores-grid">
        <!-- Opções de valores serão renderizadas aqui -->
      </div>
      <div id="orc-parcelamento-txt" class="parcelamento-info fade-in">
        <!-- Texto de parcelamento será renderizado aqui -->
      </div>
    </section>

    <section id="section-aereo" class="section-card fade-in">
      <h2><i class="fas fa-plane"></i> Parte Aérea</h2>
      <div id="aereo-detalhes" class="adicionais-grid">
        <!-- Detalhes de aéreo serão renderizados aqui -->
      </div>
    </section>

    <section id="section-carro" class="section-card fade-in">
      <h2><i class="fas fa-car"></i> Aluguel de Carro</h2>
      <div id="carro-detalhes" class="adicionais-grid">
        <!-- Detalhes de carro serão renderizados aqui -->
      </div>
    </section>

    <section id="section-galeria" class="section-card fade-in">
      <h2><i class="fas fa-images"></i> Galeria de Fotos</h2>
      <div id="galeria-grid" class="galeria-grid">
        <!-- Galeria de fotos será renderizada aqui -->
      </div>
    </section>

    <section id="section-condicoes" class="section-card fade-in">
      <h2><i class="fas fa-file-contract"></i> Condições Gerais</h2>
      <div id="condicoes-gerais" class="texto-formatado">
        <!-- Condições gerais serão renderizadas aqui -->
      </div>
    </section>

    <section id="section-observacoes" class="section-card fade-in">
      <h2><i class="fas fa-exclamation-triangle"></i> Observações Importantes</h2>
      <div id="observacoes" class="texto-formatado">
        <!-- Observações importantes serão renderizadas aqui -->
      </div>
    </section>

  </div>

  <div class="fab-area">
    <button class="fab-btn pdf" onclick="gerarPDF()"><i class="fas fa-file-pdf"></i></button>
    <button class="fab-btn wpp" onclick="envWppOrc()"><i class="fab fa-whatsapp"></i></button>
  </div>

  <div id="load-overlay" class="load-overlay">
    <div class="spinner"></div>
    <p>Gerando PDF...</p>
    <div class="progress-bar">
      <div id="load-bar" class="progress-bar-fill"></div>
    </div>
  </div>

    function formatarMoeda(valor) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
    }

    function formatarData(data) {
      if (!data) return '';
      return new Date(data + 'T00:00:00').toLocaleDateString('pt-BR', {

      });
